<article class="product-card card text-center h-100 hover-card">

    <a [routerLink]="['/product-detail', myProduct()?.id]">
        <img class="card-img-top mb-2" [src]="myProduct()?.imageUrl" [alt]="myProduct()?.name" width="200" height="200"
            style="object-fit: cover;">
    </a>

    <div class="card-body">
        <h5 class="card-title">{{ myProduct()?.name }}</h5>
        <p class="card-text">{{ myProduct()?.price?.toFixed(2) }} €</p>
    </div>

    <div class="d-flex justify-content-center mt-2 mb-3">
        <button class="btn btn-carrito" (click)="addProduct()">
            Añadir 
        </button>
    </div>
</article>

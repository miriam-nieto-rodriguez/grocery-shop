<div class="container mt-5">
    <div class="mb-4">
        <a routerLink="/home" class="text-decoration-none fw-semibold volver">
            <i class="bi bi-arrow-left"></i> ← Volver a la tienda
        </a>
    </div>
    @if (product()) {
    <article class="row">
        <div class="col-md-6">
            <figure class="product-img">
                <img [src]="product()!.imageUrl" [alt]="product()!.name">
            </figure>
        </div>
        <div class="col-md-6 product-details">
            <h1>{{ product()!.name }}</h1>
            <p class="price">{{ product()!.price | currency:'EUR' }}
                <span class="unidad-medida">/kg</span>
            </p>
            <p>{{ product()!.description }}</p>

            <div class="quantity-controls">
                <small class="d-block mb-3">Cantidad (kg)</small>
                <div class="d-flex align-items-center">
                    <button class="btn-menos" (click)="cambiarCantidad(-1)" [disabled]="cantidad() <= 1" >-</button>

                    <span class="quantity">
                        {{ cantidad() }}
                    </span>

                    <button class="btn-mas" (click)="cambiarCantidad(1)">+</button>

                </div>

            </div>
            <div class="d-flex justify-content-center justify-content-lg-start gap-2 mt-2 flex-wrap">
                <button class="btn-carrito w-100" (click)="agregarAlCarrito()">
                    Añadir al carrito
                </button>
            </div>

        </div>

    </article>
    }
</div>

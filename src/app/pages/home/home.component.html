<div class="container">
    <h1>Bienvenido a nuestra tienda</h1>
    <section class="row">
        @for(product of arrProducts(); track product.id){
            <article class="col-12 col-md-6 col-lg-4 col-xl-3 gx-3 gy-3">
                <app-product-card [myProduct]="product"></app-product-card>
            </article>
        }
    </section>
</div>

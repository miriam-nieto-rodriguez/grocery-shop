<div class="container mt-5 pb-5">
    <h1 class="titulo fs-2 fs-md-1">Productos Frescos del Huerto</h1>
    <h4 class="subtitulo">Directo a tu mesa, cultivado con amor</h4>
    <div class="search-container mt-4">
        <div class="search-wrapper">
            <span class="search-icon">
                <img src="search.svg" alt="lupa">
            </span>
            <input type="text" class="search-input" placeholder="Buscar frutas, verduras..." (input)="onSearch($event)">
        </div>
    </div>

    <section class="categories-section mt-5">
        <h2 class="mb-4 categorias">Categorías</h2>
        <div class="categories-grid">

            <div class="category-card" (click)="filtrarPorCategoria('fruta')"
                [class.selected]="filterText() === 'fruta'">
                <span class="category-icon">
                    <img src="apple.svg" alt="fruta" class="image-verde">
                    <img src="apple-white.svg" alt="fruta" class="image-blanca">
                </span>
                <p>Frutas</p>
            </div>
            <div class="category-card" (click)="filtrarPorCategoria('verdura')"
                [class.selected]="filterText() === 'verdura'">
                <span class="category-icon">
                    <img src="carrot.svg" alt="verdura" class="image-verde">
                    <img src="carrot-white.svg" alt="verdura" class="image-blanca">
                </span>
                <p>Verduras</p>
            </div>
            <div class="category-card" (click)="filtrarPorCategoria('hierba')"
                [class.selected]="filterText() === 'hierba'">
                <span class="category-icon">
                    <img src="leaf.svg" alt="hierba" class="image-verde">
                    <img src="leaf-white.svg" alt="hierba" class="image-blanca">
                </span>
                <p>Hierbas</p>
            </div>
            <div class="category-card" (click)="filtrarPorCategoria('especiales')"
                [class.selected]="filterText() === 'especiales'">
                <span class="category-icon">
                    <img src="star.svg" alt="especiales" class="image-verde">
                    <img src="star-white.svg" alt="especiales" class="image-blanca">
                </span>
                <p>Especiales</p>

            </div>
        </div>
    </section>

    <section class="row mt-5">
        <h2 class="mb-4 productos"> Todos los productos</h2>
        @for(product of productsPaginados(); track product.id){
        <article class="col-lg-3 col-md-4 col-sm-6 mb-4">
            <app-product-card [myProduct]="product"></app-product-card>
        </article>
        }
    </section>

    <div class="d-flex justify-content-center align-items-center gap-2 gap-md-4 mt-4 mb-5">
        <button class="btn btn-paginacion " (click)="currentPage.set(currentPage() - 1)"
            [disabled]="currentPage() === 1">←
            <span class="d-none d-sm d-sm-inline">Anterior</span>
        </button>
        <span class="paginacion-info shadow-sm ">
            <span class="d-none d-sm d-sm-inline">Página {{currentPage()}} de {{totalPages()}}</span>
        </span>
        <button class="btn btn-paginacion" (click)="currentPage.set(currentPage() + 1)"
            [disabled]="currentPage() >= totalPages()">
            <span class="d-none d-sm d-sm-inline">Siguiente </span>→
        </button>
    </div>

</div>
